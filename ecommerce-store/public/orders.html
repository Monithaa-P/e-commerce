<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zeloa Cart - My Orders</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🌿 Zeloa Cart</a>
    <div class="nav-links">
      <span id="hello-user" class="hello-user" style="display:none"></span>
      <a href="index.html">Home</a>
      <a href="orders.html" id="orders-link" style="display:none">My Orders</a>
      <a href="login.html" id="login-link">Login</a>
      <a href="#" id="logout-link" style="display:none" onclick="logout()">Logout</a>
      <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <div class="orders-container">
    <h2>📦 My Orders</h2>
    <div id="orders-list"><p style="color:#888;">Loading your orders...</p></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/main.js"></script>
  <script>
    async function loadOrders() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      try {
        const res    = await fetch('/api/orders/myorders', { headers: { 'Authorization': 'Bearer ' + token } });
        const orders = await res.json();
        const container = document.getElementById('orders-list');

        if (!orders.length) {
          container.innerHTML = `<div class="empty-state"><span>📦</span><h3>No orders yet!</h3><p>You haven't placed any orders yet.</p><br><a href="index.html">Start Shopping →</a></div>`;
          return;
        }

        container.innerHTML = orders.reverse().map(order => {
          const date   = new Date(order.createdAt).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' });
          const status = order.status.charAt(0).toUpperCase() + order.status.slice(1);
          const statusIcon = order.status === 'delivered' ? '✅' : order.status === 'shipped' ? '🚚' : '⏳';
          return `
            <div class="order-card">
              <div class="order-header">
                <div>
                  <div class="order-id">Order #${order._id.slice(-6).toUpperCase()}</div>
                  <div class="order-date">${date}</div>
                </div>
                <span class="order-status status-${order.status}">${statusIcon} ${status}</span>
              </div>
              <div style="font-size:14px; color:#555; margin-bottom:8px;">
                ${order.items.map(i => `${i.name} × ${i.quantity}`).join(' &nbsp;|&nbsp; ')}
              </div>
              <div style="font-size:13px; color:#888; margin-bottom:8px;">
                📍 ${order.shippingAddress.city}, ${order.shippingAddress.state} — ${order.shippingAddress.zipCode}
              </div>
              <div class="order-total">Total: ₹${order.totalPrice.toLocaleString()}</div>
            </div>`;
        }).join('');
      } catch (err) {
        document.getElementById('orders-list').innerHTML = '<p style="color:#e74c3c;">Failed to load orders. Please try again.</p>';
      }
    }
    loadOrders();
  </script>
</body>
</html>
