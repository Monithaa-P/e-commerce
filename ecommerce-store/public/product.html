<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zeloa Cart - Product</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🌿 Zeloa Cart</a>
    <div class="nav-links">
      <span id="hello-user" class="hello-user" style="display:none"></span>
      <a href="index.html">Home</a>
      <a href="orders.html" id="orders-link" style="display:none">My Orders</a>
      <a href="login.html" id="login-link">Login</a>
      <a href="#" id="logout-link" style="display:none" onclick="logout()">Logout</a>
      <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <div style="max-width:960px; margin:1.5rem auto; padding:0 2rem;">
    <a href="index.html" style="color:#1D9E75; font-weight:600; text-decoration:none; font-size:14px;">← Back to Products</a>
  </div>

  <div class="product-detail" id="product-detail">
    <p style="color:#888;">Loading product...</p>
  </div>

  <div class="toast" id="toast"></div>

  <footer style="margin-top:3rem;">
    <p>© 2026 Zeloa Cart — Made with 💚 for CodeAlpha Internship</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/products.js"></script>
  <script>
    async function loadProduct() {
      const id        = new URLSearchParams(window.location.search).get('id');
      const container = document.getElementById('product-detail');
      if (!id) { container.innerHTML = '<p style="color:#e74c3c;">Product not found.</p>'; return; }

      let product = null;
      try {
        const res = await fetch(`/api/products/${id}`);
        if (res.ok) product = await res.json();
      } catch (e) {}

      if (!product) product = sampleProducts.find(p => p._id === id);
      if (!product) { container.innerHTML = '<p style="color:#e74c3c;">Product not found.</p>'; return; }

      const starsHTML  = renderStars(product.rating || 4);
      const oldPrice   = product.oldPrice ? `<span class="old-price" style="font-size:16px;">₹${product.oldPrice.toLocaleString()}</span>` : '';
      const discount   = product.oldPrice ? Math.round((1 - product.price/product.oldPrice)*100) : 0;
      const productJSON = JSON.stringify(product).replace(/"/g, '&quot;');

      const imgHTML = product.image
        ? `<img src="${product.image}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='<div class=detail-img-emoji>${product.emoji||'📦'}</div>'" />`
        : `<div class="detail-img-emoji">${product.emoji || '📦'}</div>`;

      container.innerHTML = `
        <div class="detail-img">${imgHTML}</div>
        <div class="detail-info">
          <div class="card-category">${product.category}</div>
          <h1>${product.name}</h1>
          <div class="stars" style="margin:0.5rem 0;">${starsHTML}<span class="rating-count">(${(product.reviews||0).toLocaleString()} reviews)</span></div>
          <div style="display:flex; align-items:center; gap:12px; margin:1rem 0;">
            ${oldPrice}
            <span class="price" style="font-size:32px;">₹${product.price.toLocaleString()}</span>
            ${discount ? `<span style="background:#fff0f0;color:#e74c3c;padding:4px 10px;border-radius:10px;font-size:13px;font-weight:700;">${discount}% OFF</span>` : ''}
          </div>
          <p style="color:#555; font-size:15px; line-height:1.7; margin-bottom:1.5rem;">${product.description}</p>
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:1.5rem;">
            <span style="font-size:14px; color:#1D9E75; font-weight:600; background:#E1F5EE; padding:6px 14px; border-radius:20px;">
              ✅ ${product.stock > 0 ? `${product.stock} in stock` : 'Out of stock'}
            </span>
            <span style="font-size:14px; color:#888; background:#f5f5f5; padding:6px 14px; border-radius:20px;">🚚 Free delivery</span>
          </div>
          <div style="display:flex; gap:1rem;">
            <button onclick="addToCart(${productJSON})"
              style="flex:1; padding:14px 28px; background:linear-gradient(135deg,#1D9E75,#0F6E56); color:white; border:none; border-radius:30px; font-size:16px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; box-shadow:0 4px 15px rgba(29,158,117,0.35);">
              🛒 Add to Cart
            </button>
            <a href="index.html"
              style="flex:1; padding:14px 24px; border-radius:30px; font-size:15px; color:#04342C; border:2px solid #1D9E75; text-decoration:none; font-weight:600; display:flex; align-items:center; justify-content:center;">
              ← Back
            </a>
          </div>
        </div>`;

      document.title = `ShopEasy - ${product.name}`;
    }
    loadProduct();
  </script>
</body>
</html>
