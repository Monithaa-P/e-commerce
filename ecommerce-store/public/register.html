<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zeloa Cart - Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🌿 Zeloa Cart</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cart.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">🌿 Zeloa Cart</div>
      <h2>Create Account 🎉</h2>
      <p>Join Zeloa Cart and unlock amazing deals today!</p>
      <div class="error-msg" id="error-msg"></div>
      <div class="form-group">
        <label>👤 Full Name</label>
        <input type="text" id="name" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>📧 Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" />
      </div>
      <div class="form-group">
        <label>🔒 Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password" />
      </div>
      <button class="auth-btn" onclick="register()">Create My Account →</button>
      <div class="auth-switch">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    async function register() {
      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const errorMsg        = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      if (!name || !email || !password || !confirmPassword) {
        errorMsg.textContent = '⚠️ Please fill in all fields.';
        errorMsg.style.display = 'block'; return;
      }
      if (password.length < 6) {
        errorMsg.textContent = '⚠️ Password must be at least 6 characters.';
        errorMsg.style.display = 'block'; return;
      }
      if (password !== confirmPassword) {
        errorMsg.textContent = '⚠️ Passwords do not match.';
        errorMsg.style.display = 'block'; return;
      }
      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = '❌ ' + (data.message || 'Registration failed.');
          errorMsg.style.display = 'block'; return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ name: data.name, id: data._id }));
    
        window.location.href = 'index.html';
      } catch (err) {
        errorMsg.textContent = '❌ Something went wrong. Try again.';
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
